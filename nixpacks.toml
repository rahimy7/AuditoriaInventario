# Nixpacks build configuration for Railway
# Single-service deployment: API server + web frontend (served as static files)

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
cmds = ["npm install -g pnpm@11.3.0"]

[phases.install]
cmds = ["pnpm i --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/web build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
